services:
  postgres:
    image: postgres:16-alpine
    container_name: pdfsuite-postgres
    environment:
      POSTGRES_DB: pdfsuite
      POSTGRES_USER: pdfsuite
      POSTGRES_PASSWORD: pdfsuite
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - pdfsuite-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdfsuite"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pdfsuite-pgdata:
