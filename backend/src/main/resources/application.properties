server.port=8081

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5434/pdfsuite}
spring.datasource.username=${DB_USER:pdfsuite}
spring.datasource.password=${DB_PASSWORD:pdfsuite}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=200MB

app.storage.dir=${APP_STORAGE_DIR:./storage}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5174}
# Anonymous uploads are hard-deleted this many minutes after upload (privacy guarantee).
app.anonymous-expiry-minutes=${ANON_EXPIRY_MINUTES:120}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5174,http://localhost:4173}

jwt.secret=${JWT_SECRET:dev-secret-change-me-0123456789abcdef}
jwt.expiry-days=${JWT_EXPIRY_DAYS:7}

app.mail.enabled=${APP_MAIL_ENABLED:false}
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:true}
app.mail.from=${MAIL_FROM:no-reply@pdfsuite.local}

management.health.mail.enabled=false
